[DBDTracker]
# ── Capture ────────────────────────────────────────────────────────────────────
MAX_REFRESH_RATE = 15
DEAD_REFRESH_RATE = 4

# ── Paths ──────────────────────────────────────────────────────────────────────
EVENTS_YAML_PATH = events.yaml
TEMPLATES_DIR = data/templates
CSV_OUTPUT_PATH = dbd_stats.csv

# ── Match boundary ─────────────────────────────────────────────────────────────
MATCH_END_COOLDOWN_S = 30.0

# ── Output window ──────────────────────────────────────────────────────────────
OUTPUT_WINDOW_ENABLED = yes
CONTINUOUS_SCANNING = no

# ── Intiface ───────────────────────────────────────────────────────────────────
# Set USING_INTIFACE = no for CSV-only mode (no actuator output).
USING_INTIFACE = no
WEBSOCKET_ADDRESS = ws://127.0.0.1
WEBSOCKET_PORT = 12345
EXCLUDED_DEVICE_NAMES = []

# ── Safety ─────────────────────────────────────────────────────────────────────
MAX_VIBE_INTENSITY = 1.0
SCALE_ALL_INTENSITIES_BY_MAX_INTENSITY = no
BEEP_ENABLED = no
EMERGENCY_STOP_KEY_COMBO = <ctrl>+<shift>+<f10>

# ── Bleeding-out override (analog of OverStim's HACKED_EVENT) ──────────────────
# 0 = ignore | 1 = stop all vibes | 2 = run BLEEDING_OUT_PATTERN
BLEEDING_OUT_EVENT = 1
BLEEDING_OUT_PATTERN = [[0.1, 0.5], [0.0, 0.5]]
